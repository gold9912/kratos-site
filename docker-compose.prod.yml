services:
  server:
    image: ${SERVER_IMAGE:?Set SERVER_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAILS: ${ADMIN_EMAILS:?Set ADMIN_EMAILS}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY}
      MAIL_FROM: ${MAIL_FROM:-site@kratos.local}
      MAIL_TO: ${MAIL_TO:-info@kratos.ru}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  client:
    image: ${CLIENT_IMAGE:?Set CLIENT_IMAGE}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
