services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - path: server/.env
        required: false
    environment:
      PORT: 3000
      CLIENT_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
